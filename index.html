<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Calculate your monthly take-home pay with overtime and Cambodia income tax.">
  <meta name="theme-color" content="#4f6ef7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Payroll">
  <title>Payroll Calculator</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="background" aria-hidden="true">
    <div class="background__orb background__orb--1"></div>
    <div class="background__orb background__orb--2"></div>
    <div class="background__orb background__orb--3"></div>
  </div>

  <div class="app">
    <header class="header">
      <h1>Payroll Calculator</h1>
      <p class="subtitle">Calculate your monthly take-home pay after taxes</p>
    </header>

    <main class="main">
      <!-- Input Section -->
      <section class="card input-card" aria-labelledby="inputs-heading">
        <h2 id="inputs-heading">Salary Details</h2>

        <form id="payroll-form" novalidate>
          <div class="form-group">
            <label for="base-salary">Base Salary (USD)</label>
            <div class="input-wrapper">
              <span class="input-prefix" aria-hidden="true">$</span>
              <input type="number" id="base-salary" name="baseSalary" min="0" step="0.01" placeholder="0.00" required
                aria-describedby="base-salary-error">
            </div>
            <p id="base-salary-error" class="error-message" role="alert" hidden></p>
          </div>

          <div class="form-group">
            <label for="ot-hours">OT Hours</label>
            <input type="number" id="ot-hours" name="otHours" min="0" step="0.01" value="0" placeholder="0" required
              aria-describedby="ot-hours-error">
            <p id="ot-hours-error" class="error-message" role="alert" hidden></p>
          </div>
        </form>
      </section>

      <!-- Results Section -->
      <section class="card results-card" aria-labelledby="results-heading" aria-live="polite">
        <h2 id="results-heading">Payroll Summary</h2>

        <dl class="results-list">
          <div class="result-row">
            <dt>Base Salary</dt>
            <dd id="result-base-salary">—</dd>
          </div>
          <div class="result-row">
            <dt>Daily Rate</dt>
            <dd id="result-daily-rate">—</dd>
          </div>
          <div class="result-row">
            <dt>Hourly Rate</dt>
            <dd id="result-hourly-rate">—</dd>
          </div>
          <div class="result-row">
            <dt>OT Pay</dt>
            <dd id="result-ot-pay">—</dd>
          </div>
          <div class="result-row result-row--divider">
            <dt>Earnings Before Tax</dt>
            <dd id="result-earnings-before-tax">—</dd>
          </div>
          <div class="result-row result-row--deduction">
            <dt>Pension Fund Deduction</dt>
            <dd id="result-pension">—</dd>
          </div>
          <div class="result-row result-row--deduction">
            <dt>Income Tax</dt>
            <dd id="result-income-tax">—</dd>
          </div>
        </dl>

        <div class="take-home">
          <span class="take-home__label">Take Home Pay</span>
          <span id="result-take-home" class="take-home__value">—</span>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>

</html>
